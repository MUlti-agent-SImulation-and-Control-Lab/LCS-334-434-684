### ekf_gps_config.yaml ###
ekf_filter_node_odom: # Local Filter
  ros__parameters:
    use_sim_time: true
    frame_id: odom
    child_frame_id: base_link
    publish_tf: true
    # Fusing Wheel Odom and IMU
    odom0: /a200_0000/platform/odom
    odom0_config: [true,  true,  false, # X, Y, Z
                  false, false, true,  # Roll, Pitch, Yaw
                  true,  true,  false, # VX, VY, VZ
                  false, false, true,  # Vroll, Vpitch, Vyaw
                  false, false, false] # Ax, Ay, Az
    imu0: /a200_0000/sensors/imu_0/data
    imu0_config: [false, false, false,
                  true,  true,  true,
                  false, false, false,
                  true,  true,  true,
                  true,  true,  true]

ekf_filter_node_map: # Global Filter
  ros__parameters:
    use_sim_time: true
    frame_id: map
    child_frame_id: odom
    publish_tf: true
    # Fuse everything + GPS Odometry
    odom0: /a200_0000/platform/odom
    odom0_config: [true,  true,  false, 
                  false, false, true,
                  true,  true,  false,
                  false, false, true,
                  false, false, false]
    odom1: /odometry/gps # This comes from navsat_transform_node
    odom1_config: [true,  true,  false,
                  false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, false]
    imu0: /a200_0000/sensors/imu_0/data
    imu0_config: [false, false, false,
                  true,  true,  true,
                  false, false, false,
                  true,  true,  true,
                  true,  true,  true]

navsat_transform:
  ros__parameters:
    use_sim_time: true
    magnetic_declination_radians: 0.0
    yaw_offset: 0.0 # Adjust if your GPS/IMU headings differ
    publish_filtered_gps: true
    broadcast_cartesian_transform: true
    wait_for_datum: false