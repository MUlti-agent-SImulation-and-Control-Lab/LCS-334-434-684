serial_number: a200-0000
version: 0
system:
  hosts:
    - hostname: cpr-a200-0000
      ip: 192.168.131.1
  ros2:
    namespace: a200_0000
platform:
  attachments:
    - name: front_bumper
      type: a200.bumper
      parent: front_bumper_mount
    - name: rear_bumper
      type: a200.bumper
      parent: rear_bumper_mount
    - name: top_plate
      type: a200.top_plate
      model: pacs
    - name: sensor_arch
      type: a200.sensor_arch
      parent: default_mount
      model: sensor_arch_300
      enabled: true
sensors:
  imu:
  - model: microstrain_imu
    urdf_enabled: true
    launch_enabled: true
    parent: base_link
    xyz: [0.0, 0.0, 0.0]
    rpy: [0.0, 0.0, 0.0]
    ros_parameters:
      microstrain_inertial_driver:
        imu_frame_id: imu_0_link
        port: /dev/tty
        use_enu_frame: true
  lidar3d:
  - model: velodyne_lidar
    urdf_enabled: true
    launch_enabled: true
    parent: sensor_arch_mount
    xyz: [0.0, 0.0, 0.0]
    rpy: [0.0, 0.0, 0.0]
    ros_parameters:
      velodyne_driver_node:
        frame_id: lidar3d_0
        device_ip: 192.168.131.25
        port: 2368
        model: 32C
      velodyne_transform_node:
        model: 32C
        fixed_frame: lidar3d_0
        target_frame: lidar3d_0
  # camera:
  # - model: intel_realsense
  #   urdf_enabled: true
  #   launch_enabled: true
  #   parent: front_bumper_mount 
  #   xyz: [0.0, 0.0, 0.0]
  #   rpy: [0.0, 0.0, 0.0]
  #   ros_parameters:
  #     camera:
  #       camera_name: camera_0
  #       device_type: d435
  #       serial_no: "0"
  #       enable_color: true
  #       rgb_camera.profile: 640,480,30
  #       enable_depth: true
  #       depth_module.profile: 640,480,30
  #       pointcloud.enable: true
  
  lidar2d:
    - model: hokuyo_ust
      urdf_enabled: true
      launch_enabled: true
      parent: sensor_arch_mount
      xyz: [0.0, 0.0, 0.0]
      rpy: [0.0, 0.0, 0.0]
      ros_parameters:
        urg_node:
          laser_frame_id: lidar2d_0_laser
          ip_address: 192.168.131.20
          ip_port: 10940
          angle_min: -2.356
          angle_max: 2.356
  gps:
  - model: novatel_smart6
    urdf_enabled: true
    launch_enabled: true
    parent: base_link
    xyz: [0.0, 0.0, 0.0]
    rpy: [0.0, 0.0, 0.0]
    ros_parameters:
      nmea_navsat_driver:
        frame_id: gps_0_link
        port: "/dev/clearpath/gps"
        baud: 115200