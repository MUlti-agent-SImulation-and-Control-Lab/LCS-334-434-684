services:
  ros2_humble:
    build: .
    container_name: ecs334_container

    runtime: nvidia

    environment:
      - DISPLAY=${DISPLAY}
      - LIBGL_ALWAYS_SOFTWARE=0
      - ROS_DOMAIN_ID=1
      - RCUTILS_COLORIZED_OUTPUT=1
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics

    volumes:
      - ./ros2_ws:/root/ros2_ws
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ros2_bash_history:/root/.bash_history_dir
    
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    stdin_open: true
    tty: true
    command: /bin/bash

    network_mode: host
    ipc: host
    pid: host

volumes:
  ros2_bash_history: